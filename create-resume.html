<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Resume - ResumeSpark</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="container">

        <div class="logo">
            <h1>ResumeSpark</h1>
            <p>Build Your Resume. Spark Your Career.</p>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="create-resume.html">Create Resume</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

    </div>

</header>

<main>

<h2 class="form-title">Create Your Resume</h2>

<form class="resume-form">
    <div class="form-group">
    <label>Full Name</label>
    <input type="text" placeholder="Enter your full name">
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="Enter your email">
</div>

<div class="form-group">
    <label>Phone Number</label>
    <input type="tel" placeholder="Enter your phone number">
</div>

<div class="form-group">
    <label>Address</label>
    <textarea placeholder="Enter your address"></textarea>
</div>

<div class="form-group">
    <label>Career Objective</label>
    <textarea placeholder="Write your career objective"></textarea>
</div>
<div class="form-group">
    <label>Education</label>
    <input type="text" placeholder="Degree (B.Sc Computer Science)">
</div>

<div class="form-group">
    <label>College Name</label>
    <input type="text" placeholder="Enter your college name">
</div>

<div class="form-group">
    <label>University</label>
    <input type="text" placeholder="Enter your university">
</div>

<div class="form-group">
    <label>Year of Passing</label>
    <input type="text" placeholder="2027">
</div>

<div class="form-group">
    <label>Percentage / CGPA</label>
    <input type="text" placeholder="Enter your percentage or CGPA">
</div>

<button type="submit" class="primary-btn">
    <div class="form-group">
    <label>Skills</label>
    <textarea placeholder="Example: HTML, CSS, JavaScript, Python"></textarea>
</div>

<div class="form-group">
    <label>Projects</label>
    <textarea placeholder="Example: ResumeSpark Website"></textarea>
</div>

<div class="form-group">
    <label>Certifications</label>
    <textarea placeholder="Example: Front-End Development"></textarea>
</div>

<div class="form-group">
    <label>Languages Known</label>
    <input type="text" placeholder="Example: Tamil, English">
</div>
</form>

</main>

<script src="script.js"></script>
<footer>
    <p>© 2026 ResumeSpark. All Rights Reserved.</p>
</footer>
</body>
</html>
